<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
 background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT5cBky-gjqgbEOPRu4nIYL074qhNnmORCftg&s');
background-size: cover;
    }
  </style>

</head>
<body>
    <div class="container bg-dark text-light p-4 mt-5 w-50 text-center rounded">
    <h1>Electricity consumption classifier</h1>
     <details>
            <summary>Instructions:</summary>
            <p id="Instruct" class="text-center"></p>
        </details>

    <input type="text" id="usage" class="form-control w-50 mx-auto" placeholder="type here...">
    <button class="btn btn-info mt-3" onclick="classifyUsage()">Check Usage</button>
    <br>
    <p> Image Source: <a href="https://www.facebook.com/almasakinqatar/" target="_blank"> Visit Almasaki Qatar

    <script>

     document.getElementById('Instruct').innerHTML = "Enter your electrcity useage in Kwh to find out your class.";

        function classifyUsage() {
            var usage = document.getElementById("usage").value

            if(isNaN(usage) || usage < 0) {
            
                alert("Please input a valid Number")
            }

            else if (usage < 100) {
           
                alert("Category: Lifeline Consumer; Description: Discounted electricity rates")
            }

            else if (usage < 200) {
            alert("Category: Low Consumption; Description: Normal residential rate")
            }

            else if (usage < 500) {
            alert("Category: High Consumption; Description: Higher electricity usage")
            }

            else if (usage > 500) {
            alert("Category: Very High Consumption Description: Heavy electricity users")
            }

            else {
            alert("Your usage cannot be classified")
            }
        }
    </script>
    </div>
</body>
</html>
