 background-image: url('https://i0.wp.com/www.electronicsandyou.com/blog/wp-content/uploads/2013/06/How-is-Electricity-Generated.jpg');

<body>
    <div class="container bg-dark text-light p-4 mt-5 w-50 text-center rounded">
    <h1>Electricity consumption classifier</h1>
     <details>
            <summary>Instructions:</summary>
            <p id="Instruct" class="text-center"></p>
        </details>

    <input type="text" id="usage" class="form-control w-50 mx-auto" placeholder="type here...">
    <button class="btn btn-info mt-3" onclick="classifyUsage()">Check Usage</button>
    <br>
    <p> Image Source: <a href="https://www.electronicsandyou.com/blog/how-to-generate-electricity-how-is-electricity-generated.html" target="_blank">
    how is electricity generated - electronics tutorial

    <script>

     document.getElementById('Instruct').innerHTML = "Enter your electrcity useage in Kwh to find out your class.";

        function classifyUsage() {
            var usage = document.getElementById("usage").value

            if(isNaN(usage) || usage < 0) {
            
                alert("Please input a valid Number")
            }

            else if (usage <= 100) {
           
                alert("Category: Lifeline Consumer\nDescription: Discounted electricity rates")
            }

            else if (usage <= 200) {
            alert("Category: Low Consumption\nDescription: Normal residential rate")
            }

            else if (usage <= 500) {
            alert("Category: High Consumption\nDescription: Higher electricity usage")
            }

            else if (usage > 500) {
            alert("Category: Very High Consumption\nDescription: Heavy electricity users")
            }

            else {
            alert("Your usage cannot be classified")
            }
        }
    </script>
    </div>
    
</a></p>
